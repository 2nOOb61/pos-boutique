<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointage Opérateur — FOREVER MG</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #1a4a3a;
      --primary-hover:  #153d30;
      --primary-light:  #e8f4f0;
      --secondary:      #e8834a;
      --secondary-hover:#d4723b;
      --secondary-light:#fdf0e8;
      --success:        #16a34a;
      --success-bg:     #dcfce7;
      --warning:        #d97706;
      --warning-bg:     #fef3c7;
      --danger:         #dc2626;
      --danger-bg:      #fee2e2;
      --bg:             #f8f7f4;
      --surface:        #ffffff;
      --border:         #e5e3df;
      --text:           #1c1917;
      --text-secondary: #78716c;
      --text-muted:     #a8a29e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--primary);
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .login-logo-icon {
      width: 44px; height: 44px;
      background: var(--primary);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .login-logo-icon svg { color: white; }
    .login-title { font-size: 20px; font-weight: 700; color: var(--primary); }
    .login-sub   { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .login-label {
      display: block;
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-secondary);
      margin-bottom: 6px; margin-top: 16px;
    }
    .login-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    .login-input:focus { border-color: var(--primary); background: white; }

    .btn-login {
      width: 100%; margin-top: 24px;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none; border-radius: 12px;
      font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-login:hover { background: var(--primary-hover); }
    .btn-login:active { transform: scale(.98); }

    .login-error {
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--danger-bg);
      color: var(--danger);
      border-radius: 8px;
      font-size: 13px; font-weight: 500;
      display: none;
    }

    /* ── MAIN ── */
    #mainScreen { display: none; min-height: 100vh; flex-direction: column; }

    .top-bar {
      background: var(--primary);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .top-bar-user { display: flex; align-items: center; gap: 10px; }
    .top-bar-avatar {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: white;
    }
    .top-bar-name  { font-size: 15px; font-weight: 600; color: white; }
    .top-bar-role  { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 1px; }
    .top-bar-right { display: flex; align-items: center; gap: 10px; }
    .top-bar-time  { font-size: 22px; font-weight: 700; color: white; letter-spacing: .02em; }

    .btn-logout {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.15);
      color: white; border: none; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background .15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .content { padding: 20px 16px; max-width: 640px; margin: 0 auto; width: 100%; }

    /* Refresh */
    .refresh-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .refresh-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .btn-refresh {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: var(--primary-light); color: var(--primary);
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-refresh:hover { background: #d4ece5; }
    .btn-refresh.loading svg { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Task card */
    .task-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 12px;
      transition: box-shadow .15s;
    }
    .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .task-card.en-cours { border-left: 4px solid var(--warning); }
    .task-card.a-faire  { border-left: 4px solid var(--primary); }
    .task-card.termine  { border-left: 4px solid var(--success); opacity: .7; }

    .task-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .task-dossier { font-size: 13px; font-weight: 700; color: var(--primary); }
    .task-etape   { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 3px; }
    .task-client  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .badge {
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0;
    }
    .badge-pending  { background: var(--primary-light); color: var(--primary); }
    .badge-running  { background: var(--warning-bg);    color: var(--warning); }
    .badge-done     { background: var(--success-bg);    color: var(--success); }

    .task-meta {
      display: flex; gap: 16px; margin-top: 10px;
      font-size: 12px; color: var(--text-muted);
    }
    .task-meta span { display: flex; align-items: center; gap: 4px; }

    .task-actions { display: flex; gap: 8px; margin-top: 14px; }

    .btn-start {
      flex: 1; padding: 11px;
      background: var(--primary); color: white;
      border: none; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-start:hover { background: var(--primary-hover); }

    .btn-stop {
      flex: 1; padding: 11px;
      background: var(--secondary); color: white;
      border: none; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-stop:hover { background: var(--secondary-hover); }

    .btn-disabled {
      flex: 1; padding: 11px;
      background: #f5f4f2; color: var(--text-muted);
      border: none; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 500;
      cursor: not-allowed;
    }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 48px 24px; text-align: center;
    }
    .empty-icon {
      width: 56px; height: 56px;
      background: var(--primary-light);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); }
    .empty-sub   { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1c1917; color: white;
      padding: 12px 20px; border-radius: 10px;
      font-size: 14px; font-weight: 500;
      opacity: 0; transition: opacity .2s;
      z-index: 100; white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--danger); }
    #toast.warning { background: var(--warning); }

    /* Modal commentaire */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 18px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .modal-close {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; border-radius: 8px;
      color: var(--text-muted); cursor: pointer; font-size: 18px;
      transition: background .15s;
    }
    .modal-close:hover { background: var(--bg); }
    .modal-body { padding: 18px 20px; }
    .modal-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
    .modal-ctx { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
    .modal-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit; font-size: 14px;
      resize: none; height: 80px; outline: none;
      transition: border-color .15s;
    }
    .modal-textarea:focus { border-color: var(--primary); }
    .modal-footer {
      padding: 14px 20px 18px;
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .btn-cancel-modal {
      padding: 10px 18px;
      border: 1.5px solid var(--border); background: none;
      border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 500;
      color: var(--text-secondary); cursor: pointer;
    }
    .btn-confirm-modal {
      padding: 10px 20px;
      background: var(--secondary); color: white; border: none;
      border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-confirm-modal:hover { background: var(--secondary-hover); }

    /* Loader */
    #loader {
      position: fixed; inset: 0;
      background: rgba(255,255,255,.75);
      display: none; align-items: center; justify-content: center;
      z-index: 200;
    }
    #loader.show { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
  </style>
</head>
<body>

<!-- ── LOADER ── -->
<div id="loader"><div class="spinner"></div></div>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <div>
        <div class="login-title">Pointage Opérateur</div>
        <div class="login-sub">FOREVER MG — Atelier</div>
      </div>
    </div>

    <label class="login-label">Identifiant</label>
    <input class="login-input" id="loginUser" type="text" placeholder="Votre identifiant" autocomplete="username" />

    <label class="login-label">Mot de passe</label>
    <input class="login-input" id="loginPass" type="password" placeholder="••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') doLogin()" />

    <button class="btn-login" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="loginError">Identifiant ou mot de passe incorrect</div>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="mainScreen">

  <div class="top-bar">
    <div class="top-bar-user">
      <div class="top-bar-avatar" id="topAvatar">?</div>
      <div>
        <div class="top-bar-name" id="topName">Opérateur</div>
        <div class="top-bar-role" id="topRole">—</div>
      </div>
    </div>
    <div class="top-bar-right">
      <div class="top-bar-time" id="topClock">--:--</div>
      <button class="btn-logout" onclick="doLogout()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Déconnexion
      </button>
    </div>
  </div>

  <div class="content">
    <div class="refresh-bar">
      <div class="refresh-title" id="taskCountLabel">Mes tâches</div>
      <button class="btn-refresh" id="refreshBtn" onclick="loadTasks()">
        <svg id="refreshIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Actualiser
      </button>
    </div>
    <div id="taskList"></div>
  </div>
</div>

<!-- ── MODAL TERMINER ── -->
<div class="modal-overlay" id="stopModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Terminer la tâche</div>
      <button class="modal-close" onclick="closeStopModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-ctx" id="stopModalCtx"></div>
      <div class="modal-label">Commentaire (optionnel)</div>
      <textarea class="modal-textarea" id="stopComment" placeholder="Observations, remarques..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel-modal" onclick="closeStopModal()">Annuler</button>
      <button class="btn-confirm-modal" onclick="confirmStop()">Terminer</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx94vamSaYqKyD3CNbdvy3Ue7wl4DJkANdRWBmkt483NKzp1Wk1aEkTazS_Dtc8YekIug/exec';

const ROLE_LABELS = {
  admin:'Administrateur', caissier:'Caissier', commerciale:'Commerciale',
  utilisateur:'Utilisateur', gestionnaire:'Gestionnaire Stock', comptable:'Comptable',
  chef_atelier:'Chef Atelier', operateur_prod:'Opérateur Prod', machiniste:'Machiniste',
  pao:'Graphiste PAO', finition:'Finisheur', livreur:'Livreur'
};

// Rôles autorisés sur cette interface
const ALLOWED_ROLES = ['chef_atelier','operateur_prod','machiniste','pao','finition','livreur','admin'];

const ETAPE_LABELS = {
  ACHAT:'Achat', PAO:'PAO / Conception', BAT:'BAT physique',
  RETOUR_CLIENT:'Retour client', MODIFICATIONS:'Modifications',
  PRODUCTION:'Opérateur machine', FINITION:'Finition', LIVRE:'Livraison'
};

const ETAPE_COLORS = {
  ACHAT:'#d97706', PAO:'#6c63ff', BAT:'#2563eb', RETOUR_CLIENT:'#0891b2',
  MODIFICATIONS:'#7c3aed', PRODUCTION:'#e8834a', FINITION:'#1a4a3a', LIVRE:'#16a34a'
};

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let tasks = [];
let pendingStop = null;

// ============================================================
// UTILS
// ============================================================
function showLoader()  { document.getElementById('loader').classList.add('show'); }
function hideLoader()  { document.getElementById('loader').classList.remove('show'); }

let _toastTimer;
function showToast(msg, type = 'default') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type !== 'default' ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function fmt(n) {
  return new Intl.NumberFormat('fr-MG').format(n || 0) + ' Ar';
}

// ============================================================
// CLOCK
// ============================================================
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('topClock').textContent =
      now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }
  tick();
  setInterval(tick, 1000);
}

// ============================================================
// API
// ============================================================
async function apiGet(action, params = {}) {
  let url = GAS_URL + '?action=' + action;
  Object.entries(params).forEach(([k,v]) => url += '&' + k + '=' + encodeURIComponent(v));
  try {
    const res  = await fetch(url);
    const text = await res.text();
    return JSON.parse(text);
  } catch(e) { return null; }
}

async function apiWrite(payload) {
  try {
    const url = GAS_URL + '?payload=' + encodeURIComponent(JSON.stringify(payload));
    const res  = await fetch(url);
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { return { ok: true }; }
  } catch(e) { return null; }
}

// ============================================================
// LOGIN
// ============================================================
async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!username || !password) { errEl.textContent = 'Remplissez tous les champs.'; errEl.style.display = 'block'; return; }

  showLoader();
  const r = await apiGet('login', { username, password });
  hideLoader();

  if (!r || !r.ok) {
    errEl.textContent = 'Identifiant ou mot de passe incorrect.';
    errEl.style.display = 'block';
    return;
  }

  if (!ALLOWED_ROLES.includes(r.user?.role)) {
    errEl.textContent = 'Ce compte n\'a pas accès à cette interface.';
    errEl.style.display = 'block';
    return;
  }

  currentUser = r.user;
  sessionStorage.setItem('op-user', JSON.stringify(currentUser));
  enterMain();
}

function doLogout() {
  sessionStorage.removeItem('op-user');
  currentUser = null;
  tasks = [];
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainScreen').style.display  = 'none';
}

// ============================================================
// MAIN
// ============================================================
function enterMain() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display  = 'flex';

  const initials = (currentUser.label || currentUser.username || '?')[0].toUpperCase();
  document.getElementById('topAvatar').textContent = initials;
  document.getElementById('topName').textContent   = currentUser.label || currentUser.username;
  document.getElementById('topRole').textContent   = ROLE_LABELS[currentUser.role] || currentUser.role;

  startClock();
  loadTasks();
}

// ============================================================
// TASKS
// ============================================================
async function loadTasks() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.style.animation = 'spin .8s linear infinite';

  const r = await apiGet('getTaches');

  btn.disabled = false;
  icon.style.animation = '';

  if (!r || !r.ok) {
    showToast('Impossible de charger les tâches', 'error');
    renderTasks([]);
    return;
  }

  const myLabel = currentUser.label || currentUser.username;
  const isAdminChef = ['admin','chef_atelier'].includes(currentUser.role);

  // Filtrer : admin/chef voient tout, les autres voient leurs tâches
  tasks = isAdminChef
    ? (r.taches || [])
    : (r.taches || []).filter(t => t.operateur === myLabel);

  // Trier : EN_COURS en premier, puis A_FAIRE, puis TERMINE
  const order = { EN_COURS: 0, A_FAIRE: 1, TERMINE: 2 };
  tasks.sort((a, b) => (order[a.statut] ?? 3) - (order[b.statut] ?? 3));

  renderTasks(tasks);
}

function renderTasks(list) {
  const container = document.getElementById('taskList');
  const active = list.filter(t => t.statut !== 'TERMINE');
  const done   = list.filter(t => t.statut === 'TERMINE');

  document.getElementById('taskCountLabel').textContent =
    active.length + ' tâche' + (active.length !== 1 ? 's' : '') + ' active' + (active.length !== 1 ? 's' : '');

  if (list.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1a4a3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="empty-title">Aucune tâche assignée</div>
        <div class="empty-sub">Vos tâches apparaîtront ici une fois assignées</div>
      </div>`;
    return;
  }

  container.innerHTML = [...active, ...done].map(t => renderTaskCard(t)).join('');
}

function renderTaskCard(t) {
  const statut = t.statut || 'A_FAIRE';
  const cardClass = statut === 'EN_COURS' ? 'en-cours' : statut === 'TERMINE' ? 'termine' : 'a-faire';
  const badgeClass = statut === 'EN_COURS' ? 'badge-running' : statut === 'TERMINE' ? 'badge-done' : 'badge-pending';
  const badgeLabel = statut === 'EN_COURS' ? 'En cours' : statut === 'TERMINE' ? 'Terminé' : 'À faire';
  const color = ETAPE_COLORS[t.etapeCode] || '#78716c';
  const etapeLabel = ETAPE_LABELS[t.etapeCode] || t.etapeLabel || t.etapeCode;

  let actionsHtml = '';
  if (statut === 'A_FAIRE') {
    actionsHtml = `
      <div class="task-actions">
        <button class="btn-start" onclick="startTask('${t.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Démarrer
        </button>
      </div>`;
  } else if (statut === 'EN_COURS') {
    actionsHtml = `
      <div class="task-actions">
        <button class="btn-stop" onclick="openStopModal('${t.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          Terminer
        </button>
      </div>`;
  } else {
    actionsHtml = `
      <div class="task-actions">
        <button class="btn-disabled" disabled>Terminé</button>
      </div>`;
  }

  const metaItems = [];
  if (t.operateur)       metaItems.push(`<span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${t.operateur}</span>`);
  if (t.dateAssignation) metaItems.push(`<span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${t.dateAssignation}</span>`);
  if (t.dateDebut && statut === 'EN_COURS') metaItems.push(`<span style="color:var(--warning)"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Débuté ${t.dateDebut}</span>`);

  return `
    <div class="task-card ${cardClass}">
      <div class="task-header">
        <div>
          <div class="task-dossier">${t.numeroDossier || '—'}</div>
          <div class="task-etape" style="color:${color}">${etapeLabel}</div>
          ${t.commentaire ? `<div class="task-client">${t.commentaire}</div>` : ''}
        </div>
        <span class="badge ${badgeClass}">${badgeLabel}</span>
      </div>
      ${metaItems.length ? `<div class="task-meta">${metaItems.join('')}</div>` : ''}
      ${actionsHtml}
    </div>`;
}

// ============================================================
// POINTAGE
// ============================================================
async function startTask(tacheId) {
  showLoader();
  const r = await apiWrite({ action: 'pointerAction', tacheId, action_: 'START' });
  hideLoader();

  if (r && r.ok) {
    const t = tasks.find(x => x.id === tacheId);
    if (t) { t.statut = 'EN_COURS'; t.dateDebut = new Date().toLocaleString('fr-FR'); }
    renderTasks(tasks);
    showToast('Tâche démarrée', 'success');
  } else {
    showToast('Erreur lors du démarrage', 'error');
  }
}

function openStopModal(tacheId) {
  const t = tasks.find(x => x.id === tacheId);
  if (!t) return;
  pendingStop = tacheId;
  const etapeLabel = ETAPE_LABELS[t.etapeCode] || t.etapeLabel;
  document.getElementById('stopModalCtx').textContent = `${t.numeroDossier} — ${etapeLabel}`;
  document.getElementById('stopComment').value = '';
  document.getElementById('stopModal').classList.add('open');
}

function closeStopModal() {
  document.getElementById('stopModal').classList.remove('open');
  pendingStop = null;
}

async function confirmStop() {
  if (!pendingStop) return;
  const t = tasks.find(x => x.id === pendingStop);
  if (!t) return;
  const comment = document.getElementById('stopComment').value.trim();

  closeStopModal();
  showLoader();
  const r = await apiWrite({
    action: 'pointerAction',
    tacheId: pendingStop,
    action_: 'END',
    etapeCode: t.etapeCode,
    commentaire: comment
  });
  hideLoader();

  if (r && r.ok) {
    t.statut = 'TERMINE';
    t.dateFin = new Date().toLocaleDateString('fr-FR');
    if (comment) t.commentaire = comment;
    // Retrier : les terminées passent en bas
    const order = { EN_COURS: 0, A_FAIRE: 1, TERMINE: 2 };
    tasks.sort((a, b) => (order[a.statut] ?? 3) - (order[b.statut] ?? 3));
    renderTasks(tasks);
    showToast('Tâche terminée', 'success');
  } else {
    showToast('Erreur lors de la finalisation', 'error');
  }
}

// ============================================================
// INIT
// ============================================================
(function init() {
  // Restaurer session si disponible
  const saved = sessionStorage.getItem('op-user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      if (currentUser && ALLOWED_ROLES.includes(currentUser.role)) {
        enterMain();
        return;
      }
    } catch(e) {}
  }
  document.getElementById('loginScreen').style.display = 'flex';
})();
</script>
